    <title>Infomuns - Historias Mágicas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

      :root {
        --mun-dark: #0b0d30;
      }

      body { background-color: var(--mun-dark); margin: 0; overflow-x: hidden; }
      .font-sans-rounded { font-family: 'Nunito', sans-serif; }
      
      .star-bg {
        background-color: var(--mun-dark);
        background-image: url("https://pulgardigital.org/wp-content/uploads/2026/01/FONDO-LUNA_B_Mesa-de-trabajo-1-scaled.png");
        background-attachment: fixed;
        background-size: cover;
        background-position: center bottom;
        background-repeat: no-repeat;
        min-height: 100vh;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }

      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .loader-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 1.5rem;
      }
      .loader-progress {
        height: 100%;
        background: #fbbf24;
        width: 30%;
        animation: loading 2s infinite ease-in-out;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
